services:
  postgres:
    image: postgres:16
    container_name: image-processor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: image_processor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d image_processor"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: image-processor-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: image-processor-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  # One-shot: create the bucket, then exit.
  minio-init:
    image: minio/mc:latest
    container_name: image-processor-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/image-processor
      "
    restart: "no"

  # One-shot: apply DB migrations, then exit. Built from the server
  # builder stage because that stage still has the Prisma CLI (a devDep).
  migrate:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      target: builder
    container_name: image-processor-migrate
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app/packages/db
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/image_processor
    command: ["bunx", "prisma", "migrate", "deploy", "--config", "prisma/prisma.config.ts"]
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: image-processor-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/image_processor
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: image-processor
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      MAX_UPLOAD_BYTES: "20971520"
      PUBLIC_API_URL: http://localhost:3000
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://localhost:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: image-processor-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/image_processor
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: image-processor
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_FORCE_PATH_STYLE: "true"
      WORKER_CONCURRENCY: "4"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: image-processor-web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  minio_data:
